<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New OTP Code</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; padding: 24px; color: #162033; }
      .wrapper { max-width: 620px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); }
      .header { background: linear-gradient(135deg, #7c3aed, #2563eb); padding: 32px 24px; color: #fff; }
      .content { padding: 32px 24px 24px; }
      .otp { display: inline-block; margin: 16px 0; padding: 14px 20px; background: #eff6ff; border: 1px dashed #2563eb; border-radius: 8px; font-size: 28px; letter-spacing: 4px; font-weight: 700; color: #1d4ed8; }
      .footer { padding: 20px 24px 32px; font-size: 12px; color: #64748b; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <h1>Your Verification Code</h1>
      </div>
      <div class="content">
        <p>Hello {{firstName}},</p>
        <p>Here is your new one-time password for completing your verification.</p>
        <div class="otp">{{otp}}</div>
        <p>This code will expire in {{expiryMinutes}} minutes. If you did not request this, please ignore this email.</p>
      </div>
      <div class="footer">
        <p>Thanks,<br />The AutoLease Team</p>
      </div>
    </div>
  </body>
</html>
